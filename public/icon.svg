<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="cardShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="emboss">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1" result="blur"/>
      <feSpecularLighting in="blur" surfaceScale="3" specularConstant="0.6" specularExponent="15" result="spec">
        <fePointLight x="200" y="100" z="200"/>
      </feSpecularLighting>
      <feComposite in="spec" in2="SourceAlpha" operator="in" result="specOut"/>
      <feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="1" k4="0"/>
    </filter>

    <linearGradient id="walletBg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#5a3a22"/>
      <stop offset="40%" stop-color="#3e2818"/>
      <stop offset="100%" stop-color="#24150c"/>
    </linearGradient>
    <linearGradient id="walletShine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="25%" stop-color="#ffffff" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="card1Grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f1f8e9"/>
      <stop offset="50%" stop-color="#dcedc8"/>
      <stop offset="100%" stop-color="#c5e1a5"/>
    </linearGradient>
    <linearGradient id="card2Grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8eaf6"/>
      <stop offset="50%" stop-color="#c5cae9"/>
      <stop offset="100%" stop-color="#9fa8da"/>
    </linearGradient>
    <linearGradient id="card3Grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#42a5f5"/>
      <stop offset="50%" stop-color="#1e88e5"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
  </defs>

  <!-- Wallet body -->
  <rect x="0" y="0" width="512" height="512" rx="88" fill="url(#walletBg)" filter="url(#shadow)"/>

  <!-- Bezel / border -->
  <rect x="4" y="4" width="504" height="504" rx="84" fill="none" stroke="#7a5032" stroke-width="3" opacity="0.6"/>
  <rect x="7" y="7" width="498" height="498" rx="81" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.08"/>
  <rect x="1" y="1" width="510" height="510" rx="87" fill="none" stroke="#000000" stroke-width="2" opacity="0.2"/>

  <!-- Shine overlay -->
  <rect x="0" y="0" width="512" height="512" rx="88" fill="url(#walletShine)"/>

  <!-- Tab notches (card slot indicators) -->
  <rect x="96" y="12" width="320" height="20" rx="6" fill="#1a0e06" opacity="0.4"/>
  <rect x="120" y="18" width="80" height="8" rx="4" fill="#2a1a0e" opacity="0.3"/>
  <rect x="216" y="18" width="80" height="8" rx="4" fill="#2a1a0e" opacity="0.3"/>
  <rect x="312" y="18" width="80" height="8" rx="4" fill="#2a1a0e" opacity="0.3"/>

  <!-- Stitched seam -->
  <line x1="60" y1="32" x2="452" y2="32" stroke="#7a5032" stroke-width="2" stroke-dasharray="6,5" opacity="0.5"/>
  <line x1="60" y1="34" x2="452" y2="34" stroke="#000000" stroke-width="1" stroke-dasharray="6,5" opacity="0.2"/>

  <!-- ===== CARD 1 (Back/left) - Driver's License ===== -->
  <g transform="rotate(-10, 256, 140)" filter="url(#cardShadow)">
    <rect x="116" y="50" width="280" height="152" rx="14" fill="url(#card1Grad)"/>
    <rect x="120" y="54" width="272" height="144" rx="11" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
    <text x="360" y="84" font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="#558b2f" text-anchor="end">DMV</text>
    <text x="360" y="96" font-family="'Inter', 'Segoe UI', sans-serif" font-size="8" font-weight="600" fill="#558b2f" opacity="0.7" text-anchor="end">LICENSE</text>
    <rect x="309" y="74" width="16" height="12" rx="3" fill="#7cb342" opacity="0.6"/>
    <text x="140" y="102" font-family="'Inter', 'Segoe UI', sans-serif" font-size="9" font-weight="600" fill="#33691e" opacity="0.6">NAME</text>
    <text x="140" y="118" font-family="'Inter', 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#1b5e20">ALEX J. RIVERA</text>
    <line x1="140" y1="124" x2="330" y2="124" stroke="#aed581" stroke-width="1" opacity="0.5"/>
    <text x="140" y="142" font-family="'Inter', 'Segoe UI', sans-serif" font-size="9" font-weight="600" fill="#33691e" opacity="0.6">CLASS</text>
    <text x="140" y="158" font-family="'Inter', 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#1b5e20">C</text>
    <text x="210" y="142" font-family="'Inter', 'Segoe UI', sans-serif" font-size="9" font-weight="600" fill="#33691e" opacity="0.6">EXP</text>
    <text x="210" y="158" font-family="'Inter', 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#1b5e20">2028-04-19</text>
    <circle cx="320" cy="130" r="22" fill="#8bc34a" opacity="0.3"/>
    <circle cx="320" cy="123" r="8" fill="#558b2f" opacity="0.3"/>
    <ellipse cx="320" cy="140" rx="12" ry="7" fill="#558b2f" opacity="0.15"/>
  </g>

  <!-- ===== CARD 2 (Middle) - Auto Insurance ===== -->
  <g transform="rotate(0, 256, 140)" filter="url(#cardShadow)">
    <rect x="116" y="62" width="280" height="152" rx="14" fill="url(#card2Grad)"/>
    <rect x="120" y="66" width="272" height="144" rx="11" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
    <text x="360" y="96" font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="#283593" text-anchor="end">SHIELD AUTO</text>
    <text x="360" y="108" font-family="'Inter', 'Segoe UI', sans-serif" font-size="8" font-weight="600" fill="#283593" opacity="0.7" text-anchor="end">INSURANCE</text>
    <path d="M315,76 L325,76 L330,84 L325,92 L320,96 L315,92 L310,84 Z" fill="none" stroke="#3949ab" stroke-width="2" opacity="0.6"/>
    <text x="140" y="114" font-family="'Inter', 'Segoe UI', sans-serif" font-size="9" font-weight="600" fill="#283593" opacity="0.6">POLICY HOLDER</text>
    <text x="140" y="130" font-family="'Inter', 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#1a237e">ALEX J. RIVERA</text>
    <line x1="140" y1="136" x2="330" y2="136" stroke="#9fa8da" stroke-width="1" opacity="0.5"/>
    <text x="140" y="152" font-family="'Inter', 'Segoe UI', sans-serif" font-size="9" font-weight="600" fill="#283593" opacity="0.6">POLICY NO.</text>
    <text x="140" y="168" font-family="'Inter', 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#1a237e">INS-7729-84K</text>
    <text x="290" y="152" font-family="'Inter', 'Segoe UI', sans-serif" font-size="9" font-weight="600" fill="#283593" opacity="0.6">COVERAGE</text>
    <text x="290" y="168" font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="#2e7d32">FULL</text>
  </g>

  <!-- ===== CARD 3 (Front/right) - Roadside Assistance ===== -->
  <g transform="rotate(10, 256, 140)" filter="url(#cardShadow)">
    <rect x="116" y="74" width="280" height="152" rx="14" fill="url(#card3Grad)"/>
    <rect x="120" y="78" width="272" height="144" rx="11" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
    <text x="360" y="108" font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" font-weight="700" fill="#ffffff" text-anchor="end">ROADSIDE</text>
    <text x="360" y="120" font-family="'Inter', 'Segoe UI', sans-serif" font-size="8" font-weight="600" fill="#ffffff" opacity="0.8" text-anchor="end">ASSISTANCE</text>
    <circle cx="324" cy="90" r="12" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
    <line x1="324" y1="82" x2="324" y2="98" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
    <line x1="316" y1="90" x2="332" y2="90" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
    <text x="140" y="126" font-family="'Inter', 'Segoe UI', sans-serif" font-size="9" font-weight="600" fill="#ffffff" opacity="0.7">MEMBER</text>
    <text x="140" y="142" font-family="'Inter', 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#ffffff">ALEX J. RIVERA</text>
    <line x1="140" y1="148" x2="330" y2="148" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
    <text x="140" y="164" font-family="'Inter', 'Segoe UI', sans-serif" font-size="9" font-weight="600" fill="#ffffff" opacity="0.7">MEMBER ID</text>
    <text x="140" y="180" font-family="'Inter', 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#ffffff">RDS-48291-MX</text>
    <rect x="275" y="168" width="16" height="16" rx="3" fill="#ffffff" opacity="0.15"/>
    <text x="283" y="180" font-family="'Inter', 'Segoe UI', sans-serif" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">24/7</text>
  </g>

  <!-- Card slot cutout -->
  <rect x="116" y="46" width="280" height="14" rx="4" fill="#140a05" opacity="0.3"/>

  <!-- Divider -->
  <line x1="76" y1="238" x2="436" y2="238" stroke="#7a5032" stroke-width="1" opacity="0.4"/>

  <!-- License number -->
  <text x="256" y="290" font-family="'Inter', 'Segoe UI', sans-serif" font-size="36" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="3" filter="url(#emboss)">POL-48291</text>

  <!-- Status badge -->
  <rect x="184" y="302" width="144" height="24" rx="12" fill="#7a5032" opacity="0.3"/>
  <text x="256" y="319" font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="#d4a574" text-anchor="middle" letter-spacing="2">COVERAGE ACTIVE</text>

  <!-- Monogram -->
  <rect x="206" y="348" width="100" height="100" rx="24" fill="#2a1a0e" stroke="#7a5032" stroke-width="2"/>
  <rect x="210" y="352" width="92" height="92" rx="21" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.06"/>
  <text x="256" y="418" font-family="'Inter', 'Segoe UI', sans-serif" font-size="36" font-weight="800" fill="#ffffff" text-anchor="middle" opacity="0.9" filter="url(#emboss)">AR</text>

  <!-- Card chip line -->
  <rect x="170" y="472" width="172" height="6" rx="3" fill="#140a05" opacity="0.5"/>
  <rect x="174" y="473" width="164" height="4" rx="2" fill="#7a5032" opacity="0.3"/>

  <!-- Dot indicators -->
  <circle cx="210" cy="472" r="4" fill="#7a5032" opacity="0.4"/>
  <circle cx="230" cy="472" r="4" fill="#7a5032" opacity="0.4"/>
  <circle cx="250" cy="472" r="4" fill="#7a5032" opacity="0.4"/>
  <circle cx="270" cy="472" r="4" fill="#7a5032" opacity="0.4"/>
  <circle cx="290" cy="472" r="4" fill="#7a5032" opacity="0.4"/>
  <circle cx="310" cy="472" r="4" fill="#7a5032" opacity="0.4"/>

  <!-- Contactless wave -->
  <path d="M160,476 Q168,466 176,476" fill="none" stroke="#7a5032" stroke-width="2" opacity="0.4"/>
  <path d="M156,472 Q168,460 180,472" fill="none" stroke="#7a5032" stroke-width="1.5" opacity="0.25"/>
</svg>
