name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NEXTAUTH_SECRET: test-secret-do-not-use-in-prod
  NEXTAUTH_URL: http://localhost:3000
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/vehicle-tracker
  AWS_ACCESS_KEY_ID: test-access-key
  AWS_SECRET_ACCESS_KEY: test-secret-key
  AWS_REGION: us-east-2
  AWS_S3_BUCKET: test-bucket
  GOOGLE_CLIENT_ID: test-google-id
  GOOGLE_CLIENT_SECRET: test-google-secret
  RESEND_API_KEY: test-resend-key
  PAYPAL_CLIENT_ID: test-paypal-client-id
  PAYPAL_CLIENT_SECRET: test-paypal-client-secret
  PAYPAL_WEBHOOK_ID: test-paypal-webhook-id
  NEXT_PUBLIC_POSTHOG_KEY: test-posthog-key
  NEXT_PUBLIC_SENTRY_DSN: ""

jobs:
  quality:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: TypeCheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/vehicle-tracker
